<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance History</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231a7a4a'/%3E%3Ctext x='32' y='44' font-family='DM Sans,sans-serif' font-size='40' font-weight='500' text-anchor='middle' fill='%23ffffff'%3E%24%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;--border2:#ccc9be;--text:#1a1916;--text2:#6b6860;--text3:#9e9b94;--green:#1a7a4a;--green-bg:#eaf4ee;--green-bd:#b6dfc6;--red:#c0392b;--red-bg:#fdf0ee;--red-bd:#f0b8b2;--amber:#8a5c00;--amber-bg:#fdf6e3;--amber-bd:#f0d898;--r:8px;--rl:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
.shell{max-width:920px;margin:0 auto;padding:48px 24px 80px;}
.header{margin-bottom:36px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.logo{font-size:22px;font-weight:500;letter-spacing:-.5px;}
.logo span{color:var(--text3);font-weight:300;}
.header-sub{font-size:13px;color:var(--text3);margin-top:3px;}
.btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;text-decoration:none;display:inline-block;}
.btn:hover{background:var(--surface2);color:var(--text);}

/* Lock screen */
.lock{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.lock-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:2rem 2.5rem;text-align:center;width:100%;max-width:360px;}
.lock-title{font-size:16px;font-weight:500;margin-bottom:4px;}
.lock-sub{font-size:13px;color:var(--text3);margin-bottom:20px;}
.lock-input{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);color:var(--text);text-align:center;letter-spacing:2px;margin-bottom:12px;}
.lock-input:focus{outline:none;border-color:var(--text3);}
.lock-btn{width:100%;padding:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border-radius:var(--r);border:none;background:var(--text);color:#fff;cursor:pointer;}
.lock-btn:hover{opacity:.85;}
.lock-err{font-size:12px;color:var(--red);margin-top:8px;min-height:18px;}

/* Month grid */
.month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:32px;}
.month-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem 1.5rem;cursor:pointer;text-align:left;transition:all .12s;font-family:'DM Sans',sans-serif;}
.month-btn:hover{border-color:var(--border2);background:var(--surface2);}
.month-btn.active{border-color:var(--text);background:var(--text);color:#fff;}
.month-btn.active .month-sub{color:rgba(255,255,255,.6);}
.month-btn.in-progress{border-color:var(--amber-bd);background:var(--amber-bg);}
.month-btn.in-progress .month-sub{color:var(--amber);}
.month-name{font-size:15px;font-weight:500;margin-bottom:2px;}
.month-sub{font-size:12px;color:var(--text3);}
.month-status{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-top:6px;}

/* Summary report */
.report-area{margin-top:8px;}
.section{margin-bottom:28px;}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;font-weight:500;color:var(--text3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:24px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;position:relative;overflow:hidden;}
.metric>*{position:relative;z-index:1;}
.metric .metric-fill{position:absolute;left:0;top:0;bottom:0;z-index:0;}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:4px;font-weight:500;}
.metric-value{font-size:20px;font-weight:500;letter-spacing:-.5px;}
.metric-sub{font-size:11px;color:var(--text2);margin-top:8px;display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.metric-sub-pct{font-weight:500;color:var(--text2);}
.metric-sub .pos{color:var(--green);}.metric-sub .neg{color:var(--red);}
.pos{color:var(--green);}.neg{color:var(--red);}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 14px;font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);}
td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--text);}
tr:last-child td{border-bottom:none;}
.tr{text-align:right;}.muted{color:var(--text2);}.bold{font-weight:500;}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px;}
.period-label{display:inline-block;font-size:12px;font-family:'DM Mono',monospace;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:3px 12px;color:var(--text2);margin-bottom:16px;letter-spacing:.3px;}

/* Spend bar */
.hbar-wrap{margin:16px 0 20px;}
.hbar-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px;}
.hbar-track{position:relative;height:10px;border-radius:6px;}

/* Delete button on month cards */
.delete-btn{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:2px 5px;border-radius:4px;line-height:1;opacity:0;transition:opacity .1s;}
.month-btn:hover .delete-btn{opacity:1;}
.delete-btn:hover{background:var(--red-bg);color:var(--red);}

/* In-progress notice */
.inprog-notice{background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--amber);margin-bottom:16px;}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div>
      <div class="logo">Finance <span>/ History</span></div>
      <div class="header-sub">Monthly spending summaries</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn" id="logoutBtn" onclick="doSignOut()" style="display:none;">Sign out</button>
      <a href="index.html" class="btn">← Back to analyzer</a>
    </div>
  </div>

  <div id="lockScreen" class="lock" style="display:flex;">
    <div class="lock-card">
      <div class="lock-title">Sign in</div>
      <div class="lock-sub">View your finance history</div>
      <input type="email" class="lock-input" id="authEmail" placeholder="Email address" style="letter-spacing:normal;text-align:left;" autocomplete="email">
      <input type="password" class="lock-input" id="authPassword" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()">
      <button class="lock-btn" id="authSubmit" onclick="doAuth()">Sign in</button>
      <div class="lock-err" id="authErr"></div>
    </div>
  </div>

  <div id="mainArea" style="display:none;">
    <div id="monthGrid" class="month-grid"></div>
    <div id="reportArea" class="report-area"></div>
  </div>
</div>

<script>
const SB_URL='https://spuwzdnuxmqnblpbdtoq.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwdXd6ZG51eG1xbmJscGJkdG9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MDEzMDcsImV4cCI6MjA5MjA3NzMwN30.xtnLIvBm5DVrQAVn9W2g3wowVyqRz5DBxCtyWJj-XjA';
const _supabase=supabase.createClient(SB_URL,SB_KEY);

async function sbHeaders(){
  var s=await _supabase.auth.getSession();
  var token=s.data.session?s.data.session.access_token:SB_KEY;
  return{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json'};
}
function fmt(n){return Math.round(n).toLocaleString('nb-NO')+'\u202Fkr';}

async function doAuth(){
  var email=document.getElementById('authEmail').value.trim();
  var password=document.getElementById('authPassword').value;
  var errEl=document.getElementById('authErr');
  errEl.textContent='';
  if(!email||!password){errEl.textContent='Email and password required.';return;}
  document.getElementById('authSubmit').disabled=true;
  document.getElementById('authSubmit').textContent='Please wait...';
  var result=await _supabase.auth.signInWithPassword({email:email,password:password});
  document.getElementById('authSubmit').disabled=false;
  document.getElementById('authSubmit').textContent='Sign in';
  if(result.error){errEl.textContent=result.error.message;return;}
  if(result.data&&result.data.session)showApp();
}

async function doSignOut(){
  await _supabase.auth.signOut();
  showAuthScreen();
}

function showAuthScreen(){
  document.getElementById('lockScreen').style.display='flex';
  document.getElementById('mainArea').style.display='none';
  document.getElementById('logoutBtn').style.display='none';
}

function showApp(){
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('mainArea').style.display='block';
  document.getElementById('logoutBtn').style.display='';
  loadMonths();
}

_supabase.auth.onAuthStateChange(function(event,session){
  if(event==='SIGNED_OUT'||!session)showAuthScreen();
});

window.addEventListener('load',async function(){
  var s=await _supabase.auth.getSession();
  if(s.data.session){showApp();}else{showAuthScreen();}
});

var sessions=[], activeMk=null;

async function loadMonths(){
  var grid=document.getElementById('monthGrid');
  grid.innerHTML='<div class="empty">Loading...</div>';
  try{
    var r=await fetch(SB_URL+'/rest/v1/monthly_sessions?select=*&order=month_key.desc',{headers:await sbHeaders()});
    sessions=await r.json();
    if(!sessions.length){grid.innerHTML='<div class="empty">No months saved yet.</div>';return;}
    renderGrid();
  }catch(e){grid.innerHTML='<div class="empty">Could not connect to database.</div>';}
}

function renderGrid(){
  var grid=document.getElementById('monthGrid');
  grid.innerHTML=sessions.map(function(s){
    var isActive=s.month_key===activeMk;
    var inProg=s.status==='in_progress';
    return '<div class="month-btn'+(isActive?' active':inProg?' in-progress':'')+'" style="position:relative;" onclick="loadMonth(\''+s.month_key+'\')">'
      +'<div class="month-name">'+s.month_label+'</div>'
      +'<div class="month-sub">'+fmt(s.total_expenses||0)+' spent</div>'
      +'<div class="month-status" style="color:'+(isActive?'rgba(255,255,255,.6)':inProg?'var(--amber)':'var(--text3)')+'">'+( inProg?'in progress':'closed')+'</div>'
      +'<button class="delete-btn" onclick="event.stopPropagation();deleteMonth(\''+s.month_key+'\')" title="Delete">&#x2715;</button>'
      +'</div>';
  }).join('');
}

async function deleteMonth(mk){
  if(!confirm('Delete '+mk+' from history? This cannot be undone.'))return;
  var hdrs=await sbHeaders();
  await fetch(SB_URL+'/rest/v1/monthly_transactions?month_key=eq.'+mk,{method:'DELETE',headers:hdrs});
  await fetch(SB_URL+'/rest/v1/monthly_sessions?month_key=eq.'+mk,{method:'DELETE',headers:hdrs});
  if(activeMk===mk){activeMk=null;document.getElementById('reportArea').innerHTML='';}
  sessions=sessions.filter(function(s){return s.month_key!==mk;});
  if(sessions.length){renderGrid();}else{document.getElementById('monthGrid').innerHTML='<div class="empty">No months saved yet.</div>';}
}

async function loadMonth(mk){
  activeMk=mk;
  renderGrid();
  var ra=document.getElementById('reportArea');
  ra.innerHTML='<div class="empty">Loading...</div>';

  var session=sessions.find(function(s){return s.month_key===mk;});
  if(!session){ra.innerHTML='<div class="empty">Session not found.</div>';return;}

  // Load transactions
  var r=await fetch(SB_URL+'/rest/v1/monthly_transactions?month_key=eq.'+mk+'&select=*&order=date.asc',{headers:await sbHeaders()});
  var txs=await r.json();

  // Exclude system-marked transactions from totals: _omitted (other month) and _transfer_* (internal)
  var income=txs.filter(function(t){return t.is_income&&t.category.indexOf('_transfer_')<0;});
  var expenses=txs.filter(function(t){return!t.is_income&&t.category!=='_omitted'&&t.category.indexOf('_transfer_')<0;});

  // Group expenses by category
  var byCat={};
  expenses.forEach(function(t){if(!byCat[t.category])byCat[t.category]=[];byCat[t.category].push(t);});

  var totalIncome=income.reduce(function(s,t){return s+(t.amount||0);},0);
  var totalExp=expenses.reduce(function(s,t){return s+(t.amount||0);},0);
  var net=totalIncome-totalExp;

  var inProg=session.status==='in_progress';
  var isPartial=session.days_elapsed&&session.days_in_month&&session.days_elapsed<session.days_in_month-1;

  var h='<div class="period-label">'+session.month_label+(inProg?' · in progress':isPartial?' · partial month':'')+'</div>';
  if(inProg) h+='<div class="inprog-notice">This month is still in progress. Data shown reflects the last upload.</div>';
  if(isPartial&&!inProg) h+='<div class="inprog-notice">Partial month: '+session.days_elapsed+' of '+session.days_in_month+' days covered.</div>';

  h+='<div class="metrics" style="grid-template-columns:repeat(2,minmax(0,1fr))">'
    +'<div class="metric"><div class="metric-label">Total income</div><div class="metric-value pos">'+fmt(totalIncome)+'</div></div>'
    +'<div class="metric"><div class="metric-label">Total expenses'+(isPartial?' <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--text3)">· so far this month</span>':'')+'</div><div class="metric-value">'+fmt(totalExp)+'</div></div>'
    +'</div>';

  var P=session.projection;
  if(P){
    var incPct=P.projected_income>0?Math.min(P.actual_income/P.projected_income,1):0;
    var bdgPct=P.projected_budgeted>0?Math.min(P.actual_budgeted/P.projected_budgeted,1):0;
    var bdgOver=P.actual_budgeted>P.projected_budgeted;
    var hrColor=P.headroom_remaining>=0?'pos':'neg';
    h+='<div class="metrics">'
      +'<div class="metric"><div class="metric-label">Projected expenses</div><div class="metric-value">'+fmt(P.projected_expenses)+'</div></div>'
      +'<div class="metric"><div class="metric-label">'+(P.salary_received?'Actual income':'Expected income')+'</div><div class="metric-value pos">'+fmt(P.projected_income)+'</div></div>'
      +'<div class="metric"><div class="metric-label">Projected net</div><div class="metric-value '+(P.projected_net>=0?'pos':'neg')+'">'+(P.projected_net>=0?'+':'')+fmt(P.projected_net)+'</div></div>'
      +'</div>'
      +'<div class="metrics">'
      +'<div class="metric"><div class="metric-fill" style="width:'+(incPct*100).toFixed(1)+'%;background:var(--green-bg);"></div><div class="metric-label">Projected income</div><div class="metric-value pos">'+fmt(P.projected_income)+'</div><div class="metric-sub"><span>Actual: '+fmt(P.actual_income)+'</span><span class="metric-sub-pct">'+(incPct*100).toFixed(0)+'%</span></div></div>'
      +'<div class="metric"><div class="metric-fill" style="width:'+(bdgPct*100).toFixed(1)+'%;background:'+(bdgOver?'var(--red-bg)':'var(--amber-bg)')+';"></div><div class="metric-label">Projected budgeted costs</div><div class="metric-value">'+fmt(P.projected_budgeted)+'</div><div class="metric-sub"><span>Actual: '+fmt(P.actual_budgeted)+'</span><span class="metric-sub-pct">'+(bdgPct*100).toFixed(0)+'%</span></div></div>'
      +'<div class="metric"><div class="metric-label">Unbudgeted costs</div><div class="metric-value">'+fmt(P.nonbudgeted_actual)+'</div><div class="metric-sub"><span>Headroom remaining</span><span class="'+hrColor+'" style="font-weight:500;">'+(P.headroom_remaining>=0?'+':'')+fmt(P.headroom_remaining)+'</span></div></div>'
      +'</div>';
  }

  // Spend bar (full month context)
  var spentPct=Math.min(totalExp/totalIncome,1);
  var fillColor=totalExp>totalIncome?'#c0392b':spentPct>0.85?'#8a5c00':'#1a7a4a';
  var fillBg=totalExp>totalIncome?'#fdf0ee':spentPct>0.85?'#fdf6e3':'#eaf4ee';
  h+='<div class="hbar-wrap">'
    +'<div class="hbar-labels"><span>Spend vs income</span><span>'+fmt(totalExp)+' of '+fmt(totalIncome)+'</span></div>'
    +'<div class="hbar-track" style="background:'+fillBg+'"><div style="width:'+Math.min(spentPct*100,100).toFixed(1)+'%;height:10px;background:'+fillColor+';border-radius:6px;"></div></div>'
    +'</div>';

  // Income breakdown
  var incomeByCat={};
  income.forEach(function(t){if(!incomeByCat[t.category])incomeByCat[t.category]=[];incomeByCat[t.category].push(t);});
  h+='<div class="section"><div class="section-title">Income</div><div class="table-wrap"><table>'
    +'<tr><th>Source</th><th class="tr">Amount</th></tr>'
    +Object.keys(incomeByCat).map(function(cat){
      var total=incomeByCat[cat].reduce(function(s,t){return s+(t.amount||0);},0);
      return '<tr><td>'+cat+'</td><td class="tr">'+fmt(total)+'</td></tr>';
    }).join('')
    +'<tr><td class="bold">Total</td><td class="tr bold">'+fmt(totalIncome)+'</td></tr>'
    +'</table></div></div>';

  // Budget vs actual — variable costs
  var BUDGET_VAR={Groceries:15000,Transport:4000,Cleaning:3840,Childcare:2640,Subscriptions:2000};
  var BUDGET_FIXED_AMT=40261;
  function varCell(actual,budget){var v=budget-actual;if(Math.abs(v)<50)return'<span style="color:var(--text3)">on budget</span>';return v>0?'<span style="color:var(--green)">+'+fmt(v)+'</span>':'<span style="color:var(--red)">'+fmt(v)+'</span>';}
  var varRows=Object.keys(BUDGET_VAR).map(function(cat){return{cat:cat,budget:BUDGET_VAR[cat],actual:(byCat[cat]||[]).reduce(function(s,t){return s+t.amount;},0)};});
  var fixedActual=(byCat['Budgeted fixed costs']||[]).reduce(function(s,t){return s+t.amount;},0);
  h+='<div class="section"><div class="section-title">Variable costs — budget vs actual</div><div class="table-wrap"><table>'
    +'<tr><th>Category</th><th class="tr">Budget</th><th class="tr">Actual</th><th class="tr">Variance</th></tr>'
    +varRows.map(function(r){
      return'<tr><td>'+r.cat+'</td><td class="tr muted">'+fmt(r.budget)+'</td><td class="tr">'+fmt(r.actual)+'</td><td class="tr">'+varCell(r.actual,r.budget)+'</td></tr>';
    }).join('')
    +'</table></div></div>';
  h+='<div class="section"><div class="section-title">Fixed costs — budget vs actual</div><div class="table-wrap"><table>'
    +'<tr><th>Category</th><th class="tr">Budget</th><th class="tr">Actual</th><th class="tr">Variance</th></tr>'
    +'<tr><td>Fixed costs — budgeted</td><td class="tr muted">'+fmt(BUDGET_FIXED_AMT)+'</td><td class="tr">'+fmt(fixedActual)+'</td><td class="tr">'+varCell(fixedActual,BUDGET_FIXED_AMT)+'</td></tr>'
    +'</table></div></div>';

  // Expenses by category
  var catRows=Object.keys(byCat).sort(function(a,b){
    return byCat[b].reduce(function(s,t){return s+t.amount;},0)-byCat[a].reduce(function(s,t){return s+t.amount;},0);
  });
  h+='<div class="section"><div class="section-title">Expenses by category</div><div class="table-wrap"><table>'
    +'<tr><th>Category</th><th class="tr">Transactions</th><th class="tr">Total</th></tr>'
    +catRows.map(function(cat){
      var ts=byCat[cat];
      var total=ts.reduce(function(s,t){return s+(t.amount||0);},0);
      return '<tr><td>'+cat+'</td><td class="tr muted">'+ts.length+'</td><td class="tr">'+fmt(total)+'</td></tr>';
    }).join('')
    +'<tr><td class="bold" colspan="2">Total</td><td class="tr bold">'+fmt(totalExp)+'</td></tr>'
    +'</table></div></div>';

  // Top 10 transactions
  var top10=expenses.slice().sort(function(a,b){return b.amount-a.amount;}).slice(0,10);
  h+='<div class="section"><div class="section-title">Largest transactions</div><div class="table-wrap"><table>'
    +'<tr><th>Date</th><th>Description</th><th>Category</th><th class="tr">Amount</th></tr>'
    +top10.map(function(t){
      return '<tr><td class="muted" style="font-family:\'DM Mono\',monospace;font-size:11px">'+t.date+'</td><td>'+t.description+'</td><td class="muted">'+t.category+'</td><td class="tr">'+fmt(t.amount)+'</td></tr>';
    }).join('')
    +'</table></div></div>';

  ra.innerHTML=h;
}
</script>
</body>
</html>
