<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Analyzer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231a7a4a'/%3E%3Ctext x='32' y='44' font-family='DM Sans,sans-serif' font-size='40' font-weight='500' text-anchor='middle' fill='%23ffffff'%3E%24%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;--border2:#ccc9be;--text:#1a1916;--text2:#6b6860;--text3:#9e9b94;--green:#1a7a4a;--green-bg:#eaf4ee;--green-bd:#b6dfc6;--red:#c0392b;--red-bg:#fdf0ee;--red-bd:#f0b8b2;--amber:#8a5c00;--amber-bg:#fdf6e3;--amber-bd:#f0d898;--r:8px;--rl:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
.shell{max-width:920px;margin:0 auto;padding:48px 24px 80px;}
.header{margin-bottom:36px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.logo{font-size:22px;font-weight:500;letter-spacing:-.5px;}
.logo span{color:var(--text3);font-weight:300;}
.header-sub{font-size:13px;color:var(--text3);margin-top:3px;}
.btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn:hover{background:var(--surface2);color:var(--text);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);}
.btn-primary:hover{opacity:.85;background:var(--text);}
.btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.btn-green:hover{background:#d8eee2;}
.btn-run{margin-top:12px;width:100%;padding:12px;font-size:14px;}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--rl);padding:36px 24px;text-align:center;cursor:pointer;transition:background .15s,border-color .15s;background:var(--surface);}
.upload-zone:hover,.upload-zone.dragover{background:var(--surface2);border-color:var(--text3);}
.upload-zone input{display:none;}
.upload-icon{font-size:26px;margin-bottom:10px;opacity:.35;}
.upload-title{font-size:15px;font-weight:500;margin-bottom:4px;}
.upload-sub{font-size:13px;color:var(--text3);}
.file-badge{display:inline-flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:5px 14px;font-size:13px;margin-top:14px;}
.file-badge .rm{cursor:pointer;color:var(--text3);font-size:16px;}
.file-badge .rm:hover{color:var(--red);}
.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:32px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;position:relative;overflow:hidden;}
.metric>*{position:relative;z-index:1;}
.metric .metric-fill{position:absolute;left:0;top:0;bottom:0;z-index:0;transition:width .3s ease;}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px;font-weight:500;}
.metric-value{font-size:22px;font-weight:500;letter-spacing:-.5px;}
.metric-value.pos{color:var(--green);}
.metric-value.neg{color:var(--red);}
.metric-sub{font-size:11px;color:var(--text2);margin-top:10px;display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.metric-sub-pct{font-weight:500;color:var(--text2);}
.metric-sub .pos{color:var(--green);}
.metric-sub .neg{color:var(--red);}
.section{margin-bottom:32px;}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;font-weight:500;color:var(--text3);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.section-title .hint{font-size:11px;text-transform:none;letter-spacing:0;font-weight:400;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 16px;font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);}
td{padding:10px 16px;border-bottom:1px solid var(--border);color:var(--text);}
tr:last-child td{border-bottom:none;}
.tr{text-align:right;}.muted{color:var(--text2);}.bold{font-weight:500;}
.pos{color:var(--green);}.neg{color:var(--red);}
.clickable-row{cursor:pointer;transition:background .1s;}
.clickable-row:hover{background:var(--surface2);}
.clickable-row td:first-child{position:relative;padding-left:32px;}
.clickable-row td:first-child::before{content:'\25BA';font-size:8px;color:var(--text3);position:absolute;left:14px;top:50%;transform:translateY(-50%);transition:transform .15s;}
.clickable-row.open td:first-child::before{transform:translateY(-50%) rotate(90deg);}
.drill-row td{padding:0;border-bottom:none;}
.drill-inner{background:#fafaf7;border-top:1px solid var(--border);}
.drill-inner table{font-size:12px;}
.drill-tx-row td{padding:8px 16px 8px 32px;border-bottom:1px solid var(--border);color:var(--text2);}
.drill-tx-row:last-child td{border-bottom:none;}
.drill-tx-row .dc{min-width:95px;white-space:nowrap;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
.drill-tx-row .ac{text-align:right;color:var(--text);font-weight:500;font-family:'DM Mono',monospace;white-space:nowrap;min-width:90px;}
.drill-tx-row .rc{white-space:nowrap;}
.reclass-sel{font-family:'DM Sans',sans-serif;font-size:11px;padding:3px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);color:var(--text);}
.reclass-btn{font-family:'DM Sans',sans-serif;font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;margin-left:4px;}
.reclass-btn:hover{background:var(--surface2);}
.reclass-btn.omit{color:var(--red);border-color:var(--red-bd);}
.reclass-btn.omit:hover{background:var(--red-bg);}
.pill{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:999px;margin-left:8px;vertical-align:middle;letter-spacing:.3px;text-transform:uppercase;}
.pill-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.pill-amb{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);}
.transfers-list{display:flex;flex-direction:column;gap:8px;}
.transfer-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.transfer-info{flex:1;min-width:0;}
.transfer-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.transfer-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
.transfer-amount{font-size:13px;font-weight:500;font-family:'DM Mono',monospace;white-space:nowrap;}
.transfer-actions{display:flex;gap:6px;}
.tbtn{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .1s;white-space:nowrap;}
.tbtn:hover{background:var(--surface2);color:var(--text);}
.tbtn.active-salary{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);font-weight:500;}
.tbtn.active-excluded{background:var(--surface2);color:var(--text);border-color:var(--border2);font-weight:500;}
.tbtn.active-other{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);font-weight:500;}
.ts{font-size:10px;font-weight:500;padding:3px 9px;border-radius:999px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px;}
.ts-in{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
.ts-ex{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.ts-ot{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.ts-buf{background:#eef4fc;color:#185fa5;border:1px solid #b8d4f0;}
.section-title.collapsible{cursor:pointer;user-select:none;}
.section-title.collapsible::after{content:'\25BC';font-size:8px;margin-left:auto;transition:transform .2s;display:inline-block;}
.section-title.collapsible.collapsed::after{transform:rotate(-90deg);}
.section-body{overflow:hidden;}
.transfer-summary{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;font-size:12px;color:var(--text2);display:flex;gap:20px;flex-wrap:wrap;margin-bottom:12px;}
.misc-all-done{background:var(--green-bg);border:1px solid var(--green-bd);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--green);text-align:center;font-weight:500;}
.rules-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.rule-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.rule-row:last-child{border-bottom:none;}
.rule-kw{flex:1;font-family:'DM Mono',monospace;font-size:12px;}
.rule-cat{color:var(--text2);font-size:12px;min-width:150px;}
.rule-del{font-family:'DM Sans',sans-serif;font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid var(--red-bd);color:var(--red);background:transparent;cursor:pointer;}
.restore-btn{font-family:'DM Sans',sans-serif;font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid var(--green-bd);color:var(--green);background:var(--green-bg);cursor:pointer;}
.rule-del:hover{background:var(--red-bg);}
.no-rules{padding:16px;font-size:13px;color:var(--text3);}
.cat-grid{display:flex;flex-wrap:wrap;gap:8px;}
.cat-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:12px;}
.cat-chip .cat-del{cursor:pointer;color:var(--text3);font-size:14px;line-height:1;}
.cat-chip .cat-del:hover{color:var(--red);}
.add-cat-row{display:flex;gap:8px;margin-top:12px;}
.add-cat-row input{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);flex:1;}
.add-cat-row input:focus{outline:none;border-color:var(--text3);}
.gh-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.gh-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.gh-dot.ok{background:var(--green);}
.gh-dot.err{background:var(--red);}
.gh-dot.loading{background:var(--amber);}
.gh-bar input{font-family:'DM Mono',monospace;font-size:12px;padding:4px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);width:240px;}
.gh-bar input:focus{outline:none;border-color:var(--text3);}
.err-box{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r);padding:12px 16px;color:var(--red);font-size:13px;margin-top:12px;}
.period-label{display:inline-block;font-size:12px;font-family:'DM Mono',monospace;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:4px 14px;color:var(--text2);margin-bottom:20px;letter-spacing:.3px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 16px;border-radius:var(--r);display:none;align-items:center;gap:14px;z-index:9999;white-space:nowrap;}
.toast-undo{font-size:12px;padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;}
.toast-undo:hover{background:rgba(255,255,255,.15);}
@media print{
  body{background:#fff;font-size:12px;}
  .shell{padding:0;max-width:100%;}
  .no-print{display:none!important;}
  .gh-bar,#transferSection,#miscInteractive,#rulesSection,#categoriesSection,.upload-zone,#runBtn,#err,#printBtn{display:none!important;}
  .section{break-inside:avoid;margin-bottom:20px;}
  .clickable-row td:first-child{padding-left:12px;}
  .clickable-row td:first-child::before{display:none;}
  .drill-row{display:none!important;}
  .report-print-header{display:block!important;}
  #miscPrintTable{display:block!important;}
  #manualPrintSection{display:block!important;}
}
.report-print-header{display:none;font-size:18px;font-weight:500;margin-bottom:4px;letter-spacing:-.3px;}
.report-print-sub{display:none;font-size:12px;color:var(--text2);margin-bottom:24px;}
@media print{.report-print-sub{display:block;}}
#miscPrintTable{display:none;}
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:2rem 2.5rem;text-align:center;width:100%;max-width:360px;}
.auth-title{font-size:16px;font-weight:500;margin-bottom:4px;}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:20px;}
.auth-input{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);color:var(--text);margin-bottom:10px;}
.auth-input:focus{outline:none;border-color:var(--text3);}
.auth-btn{width:100%;padding:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border-radius:var(--r);border:none;background:var(--text);color:#fff;cursor:pointer;margin-bottom:8px;}
.auth-btn:hover{opacity:.85;}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;}
.auth-btn-sec{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.auth-btn-sec:hover{background:var(--surface2);color:var(--text);opacity:1;}
.auth-err{font-size:12px;color:var(--red);min-height:18px;margin-top:4px;}
</style>
</head>
<body>
<div class="shell">
  <div id="authScreen" class="auth-screen" style="display:flex;">
    <div class="auth-card">
      <div class="auth-title">Sign in</div>
      <div class="auth-sub">Access your finance data</div>
      <input type="email" class="auth-input" id="authEmail" placeholder="Email address" autocomplete="email">
      <input type="password" class="auth-input" id="authPassword" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()">
      <button class="auth-btn" id="authSubmit" onclick="doAuth()">Sign in</button>
      <div class="auth-err" id="authErr"></div>
    </div>
  </div>
  <div id="appArea" style="display:none;">
  <div class="header">
    <div>
      <div class="logo">Finance <span>/ Analyzer</span></div>
      <div class="header-sub">Upload your monthly bank export to generate a structured report</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <a href="history.html" class="btn no-print" style="text-decoration:none">View history</a>
      <span id="saveStatus" style="font-size:12px;color:var(--text3);transition:opacity 0.5s;opacity:0;"></span>
      <button class="btn no-print" id="saveHistoryBtn" style="display:none" onclick="saveToHistory()">Save to history</button>
      <button class="btn no-print" id="saveMonthBtn" style="display:none" onclick="saveAndCloseMonth()">Close month</button>
      <button class="btn btn-green no-print" id="printBtn" style="display:none" onclick="window.print()">Print / Save PDF</button>
      <button class="btn no-print" id="logoutBtn" onclick="doSignOut()" style="display:none;">Sign out</button>
    </div>
  </div>

  <div class="gh-bar no-print">
    <div class="gh-dot" id="ghDot"></div>
    <span id="ghStatus">Enter GitHub token to sync rules across devices</span>
    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    <button class="btn" onclick="connectGitHub()">Connect</button>
  </div>

  <div class="upload-zone" id="dz">
    <input type="file" id="fi" accept=".csv">
    <div class="upload-icon">&#8593;</div>
    <div class="upload-title">Upload bank transaction export</div>
    <div class="upload-sub">Semicolon-separated CSV &middot; Norwegian bank format</div>
    <div id="badge"></div>
  </div>
  <button class="btn btn-primary btn-run" id="runBtn" disabled>Run analysis</button>
  <div id="err"></div>
  <div id="report"></div>
  </div><!-- #appArea -->
</div>

<div class="toast" id="toast">
  <span id="toastMsg"></span>
  <button class="toast-undo" onclick="doUndo()">Undo</button>
</div>

<script>
window.onerror=function(msg,src,line,col,err){
  var m=String(msg||'');
  if(m.indexOf('ResizeObserver loop')>-1) return false;
  if(m==='Script error.'||m==='') return false;
  var d=document.createElement('div');
  d.style='position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;padding:12px 16px;font-family:monospace;font-size:13px;z-index:99999;white-space:pre-wrap;';
  d.textContent='JS ERROR: '+msg+'\nLine: '+line+' Col: '+col+'\nFile: '+src;
  document.body.appendChild(d);
  return false;
};
window.addEventListener('unhandledrejection',function(e){
  var d=document.createElement('div');
  d.style='position:fixed;top:40px;left:0;right:0;background:#8a5c00;color:#fff;padding:12px 16px;font-family:monospace;font-size:13px;z-index:99999;white-space:pre-wrap;';
  d.textContent='PROMISE ERROR: '+(e.reason&&e.reason.message?e.reason.message:e.reason);
  document.body.appendChild(d);
});
const SB_URL='https://spuwzdnuxmqnblpbdtoq.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwdXd6ZG51eG1xbmJscGJkdG9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MDEzMDcsImV4cCI6MjA5MjA3NzMwN30.xtnLIvBm5DVrQAVn9W2g3wowVyqRz5DBxCtyWJj-XjA';
const _supabase=supabase.createClient(SB_URL,SB_KEY);
async function sbHeaders(){
  var s=await _supabase.auth.getSession();
  var token=s.data.session?s.data.session.access_token:SB_KEY;
  return{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'};
}
async function doAuth(){
  var email=document.getElementById('authEmail').value.trim();
  var password=document.getElementById('authPassword').value;
  var errEl=document.getElementById('authErr');
  errEl.textContent='';
  if(!email||!password){errEl.textContent='Email and password required.';return;}
  document.getElementById('authSubmit').disabled=true;
  document.getElementById('authSubmit').textContent='Please wait...';
  var result=await _supabase.auth.signInWithPassword({email:email,password:password});
  document.getElementById('authSubmit').disabled=false;
  document.getElementById('authSubmit').textContent='Sign in';
  if(result.error){errEl.textContent=result.error.message;return;}
  if(result.data&&result.data.session)showApp();
}
async function doSignOut(){
  await _supabase.auth.signOut();
  showAuthScreen();
}
function showAuthScreen(){
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('appArea').style.display='none';
  document.getElementById('logoutBtn').style.display='none';
}
function showApp(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('appArea').style.display='block';
  document.getElementById('logoutBtn').style.display='';
}
_supabase.auth.onAuthStateChange(function(event,session){
  if(event==='SIGNED_OUT'||!session)showAuthScreen();
});
const GH_OWNER='eriklangaardsolberg-svg',GH_REPO='moneymeeting',GH_FILE='rules.json',GH_BRANCH='main';
const DEFAULT_CATS=['Groceries','Transport','Budgeted fixed costs','Childcare','Cleaning','Subscriptions','Wolt','Bakeries','Restaurants','Health & wellbeing','Shopping','Travel','Entertainment','Flowers','Gifts','Professional fees','Education','Insurance','Tax','Books','Kiosk','Misc'];
let CATEGORIES=[...DEFAULT_CATS];
let CUSTOM_RULES=[];
let ghToken=localStorage.getItem('gh_token')||'';
let ghConnected=false,ghSha=null;
let csvText=null,lastReport=null,transferState={},txOverrides={},undoStack=[],toastTimer=null;
let manualExpenses=[]; // [{desc,amount,cat,date}]

async function ghLoad(){
  setGhStatus('loading','Connecting\u2026');
  try{
    const r=await fetch('https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE+'?ref='+GH_BRANCH,{headers:ghHeaders()});
    if(r.status===404){ghConnected=true;ghSha=null;setGhStatus('ok','Connected \u00b7 no rules file yet');return;}
    if(!r.ok)throw new Error();
    const j=await r.json();ghSha=j.sha;
    const data=JSON.parse(atob(j.content.replace(/\n/g,'')));
    CUSTOM_RULES=data.rules||[];
    if(data.categories){
      CATEGORIES=data.categories.map(function(cat){
        // Migrate old category name
        return cat==='Housing'?'Budgeted fixed costs':cat;
      });
    }
    ghConnected=true;
    setGhStatus('ok','Connected \u00b7 '+CUSTOM_RULES.length+' rule'+(CUSTOM_RULES.length!==1?'s':'')+' loaded');
  }catch(e){setGhStatus('err','Connection failed \u2014 check token');ghConnected=false;}
}
async function ghSave(){
  if(!ghConnected||!ghToken)return;
  const content=btoa(unescape(encodeURIComponent(JSON.stringify({rules:CUSTOM_RULES,categories:CATEGORIES},null,2))));
  const body={message:'Update rules',content:content,branch:GH_BRANCH};
  if(ghSha)body.sha=ghSha;
  try{
    const r=await fetch('https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE,{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
    const j=await r.json();

function getRules(){return CUSTOM_RULES.concat(BASE_RULES);}
function normaliseNO(s){
  // Normalise common Norwegian character encoding variants
  return s
    .replace(/æ/g,'ae').replace(/Æ/g,'ae')
    .replace(/ø/g,'o').replace(/Ø/g,'o')
    .replace(/å/g,'a').replace(/Å/g,'a')
    .replace(/ä/g,'a').replace(/ö/g,'o')  // Swedish variants too
    .replace(/ae/g,'ae');
}
function toMatchStr(s){
  // Return both original lowercased and normalised version for matching
  return s.toLowerCase();
}
function matchRule(desc, ruleVal){
  var d=desc.toLowerCase();
  var v=ruleVal.toLowerCase();
  // Try direct match first
  if(d.indexOf(v)>=0) return true;
  // Try normalised match (handles æøå encoding differences)
  if(normaliseNO(d).indexOf(normaliseNO(v))>=0) return true;
  return false;
}
function classify(desc){
  var d=desc.toLowerCase();
  for(var i=0;i<getRules().length;i++){
    var r=getRules()[i];
    if(r.m==='contains'&&matchRule(d,r.v))return r.cat;
    if(r.m==='regex'&&(new RegExp(r.v,'iu').test(d)||new RegExp(r.v,'iu').test(normaliseNO(d))))return r.cat;
  }
  return 'Misc';
}
function isInternal(row){return classify(row.desc)==='INTERNAL';}
function parseNOK(s){if(!s||!s.trim())return 0;return parseFloat(s.replace(/\s/g,'').replace(/\./g,'').replace(',','.'))||0;}
function fmt(n){return Math.round(n).toLocaleString('nb-NO')+'\u202Fkr';}
function varCell(actual,budget){
  var v=budget-actual;
  if(v>0)return'<span class="pos">+'+fmt(v)+' left</span>';
  if(v<0)return'<span class="neg">\u2212'+fmt(Math.abs(v))+' over</span>';
  return'<span class="muted">on budget</span>';
}

async function sbSaveSession(d1,report,baseTransactions){
  baseTransactions=baseTransactions||[];
  var monthKey=getMonthKey(d1);
  var monthLabel=getMonthLabel(d1);
  // Build set of omitted UIDs so we can mark them explicitly in storage
  var omittedUids={};
  Object.keys(txOverrides).forEach(function(k){if(txOverrides[k]&&txOverrides[k].omit)omittedUids[k]=true;});
  // Classified (non-omitted) transactions — highest priority in merge
  var classifiedTxs=Object.values(report.byCategory).flat().concat(report.income).map(function(t){
    return{month_key:monthKey,uid:uid(t),date:t.date,description:t.desc,amount:t.amount,category:t.cat,is_income:!!t.isIncome,ut:t.ut||0,inn:t.inn||0};
  });
  // Omitted base transactions — stored with category '_omitted' so history excludes them from totals
  var omittedTxs=baseTransactions.filter(function(t){return omittedUids[uid(t)];}).map(function(t){
    return{month_key:monthKey,uid:uid(t),date:t.date,description:t.desc,amount:t.amount,category:'_omitted',is_income:false,ut:t.ut||0,inn:t.inn||0};
  });
  // Internal transfers — stored with category '_transfer_<state>' so history can show/exclude them
  var internalTxs=(report.allInternals||[]).map(function(t){
    var tuid=uid(t),state=transferState[tuid]||'excluded';
    return{month_key:monthKey,uid:tuid,date:t.date,description:t.desc,amount:t.inn||t.ut,category:'_transfer_'+state,is_income:state==='income',ut:t.ut||0,inn:t.inn||0};
  });
  // Remaining base txs as fallback (non-omitted, not already classified)
  var allBaseTxs=baseTransactions.filter(function(t){return!omittedUids[uid(t)];}).map(function(t){
    return{month_key:monthKey,uid:uid(t),date:t.date,description:t.desc,amount:t.amount,category:t.cat,is_income:!!t.isIncome,ut:t.ut||0,inn:t.inn||0};
  });
  // Merge: classified > omitted > internals > base (first-seen wins)
  var seenUids={};
  var txs=[];
  classifiedTxs.concat(omittedTxs,internalTxs,allBaseTxs).forEach(function(t){if(!seenUids[t.uid]){seenUids[t.uid]=true;txs.push(t);}});
  // Save transactions: delete existing rows for the month then re-insert (avoids upsert/unique-constraint issues)
  var hdrs=await sbHeaders();
  var simpleHdrs={'apikey':hdrs['apikey'],'Authorization':hdrs['Authorization'],'Content-Type':'application/json'};
  await fetch(SB_URL+'/rest/v1/monthly_transactions?month_key=eq.'+monthKey,{method:'DELETE',headers:simpleHdrs});
  if(txs.length>0){
    var txResp=await fetch(SB_URL+'/rest/v1/monthly_transactions',{method:'POST',headers:simpleHdrs,body:JSON.stringify(txs)});
    if(!txResp.ok){var txErr=await txResp.text();console.warn('[SB] Transaction save failed ('+txResp.status+'):', txErr);}
  }
  // Save session: PATCH if exists, POST if new
  var proj=computeProjection(report);
  var session={
    month_key:monthKey,
    month_label:monthLabel,
    total_income:report.totalIncome,
    total_expenses:report.totalExp,
    net:report.net,
    overrides:txOverrides,
    transfer_state:transferState,
    fixed_paid:window._fixedPaid||{},
    categories:CATEGORIES,
    manual_expenses:manualExpenses,
    projection:proj?{
      projected_income:proj.effectiveIncome,
      actual_income:proj.actualIncome,
      salary_received:proj.salaryReceived,
      projected_budgeted:proj.projectedBudgeted,
      actual_budgeted:proj.actualBudgeted,
      nonbudgeted_actual:proj.nonBudgetedActual,
      headroom_remaining:proj.headroomRemaining,
      projected_expenses:proj.projExp,
      projected_net:proj.projNet
    }:null,
    status:'in_progress',
    updated_at:new Date().toISOString()
  };
  var patchResp=await fetch(SB_URL+'/rest/v1/monthly_sessions?month_key=eq.'+monthKey,{method:'PATCH',headers:Object.assign({},simpleHdrs,{'Prefer':'return=representation'}),body:JSON.stringify(session)});
  var patched=patchResp.ok?await patchResp.json():[];
  if(!Array.isArray(patched)||patched.length===0){
    var postResp=await fetch(SB_URL+'/rest/v1/monthly_sessions',{method:'POST',headers:simpleHdrs,body:JSON.stringify(session)});
    if(!postResp.ok){var sessErr=await postResp.text();throw new Error('Session save failed ('+postResp.status+'): '+sessErr);}
  }
  setSaveStatus('Saved to cloud');
}

      var lsKey='mm_session_'+monthKey;

      if(!saved){
        // Not in localStorage — try Supabase (cross-device)
        setSaveStatus('Loading shared session...');

        if(sbSession){
          saved={
            overrides: sbSession.overrides||{},

            manualExpenses: sbSession.manual_expenses||[]
          };

        }
      } else {
        console.log('[LS] Loaded from localStorage, overrides:', Object.keys(saved.overrides||{}).length);
      }

      if(saved && (Object.keys(saved.overrides||{}).length || Object.keys(saved.transferState||{}).length)){
        // Restore all saved state before buildReport runs
        if(saved.overrides) Object.keys(saved.overrides).forEach(function(k){txOverrides[k]=saved.overrides[k];});
        if(saved.transferState) Object.keys(saved.transferState).forEach(function(k){transferState[k]=saved.transferState[k];});
        if(saved.fixedPaid) window._fixedPaid=saved.fixedPaid;
        if(saved.categories&&saved.categories.length){
        CATEGORIES=saved.categories.map(function(cat){
          return cat==='Housing'?'Budgeted fixed costs':cat;
        });
      }
        if(saved.manualExpenses&&saved.manualExpenses.length) manualExpenses=saved.manualExpenses;
        setSaveStatus('Resumed '+monthLabel);
      } else {
        console.log('[SB] No session found, starting fresh');
      }

      // 3. Re-analyze with restored state — new transactions init, existing keep state
      var report2=analyze(csvText);
      lastReport=buildReport(report2.allInternals,report2.baseTransactions);
      render(lastReport);
      document.getElementById('printBtn').style.display='';
      document.getElementById('saveMonthBtn').style.display='';
      document.getElementById('saveHistoryBtn').style.display='';

    } catch(e){
      console.error('Run error:', e);
      document.getElementById('err').innerHTML='<div class="err-box">Error: '+e.message+'</div>';
    }
  })();
});

function uid(t){return t.date+'|'+t.desc+'|'+t.ut+'|'+t.inn;}
function analyze(raw){
  var text=raw.replace(/^\uFEFF/,'');
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  var allInternals=[],baseTransactions=[],seen={};
  for(var i=1;i<lines.length;i++){
    var cols=lines[i].split(';');if(cols.length<5)continue;
    var row={date:cols[0].trim(),desc:cols[2].trim(),ut:parseNOK(cols[3]),inn:parseNOK(cols[4])};
    var k=uid(row);if(seen[k])continue;seen[k]=true;
    if(isInternal(row)){allInternals.push(row);continue;}
    var cat=classify(row.desc);
    if(['INCOME_NAV','INCOME_SALARY','INCOME_PROJECT'].indexOf(cat)>=0&&row.inn>0)
      baseTransactions.push(Object.assign({},row,{cat:cat,isIncome:true,amount:row.inn}));
    else if(row.inn>0&&row.ut===0&&cat.indexOf('INCOME')!==0&&row.inn>=100&&!/dnb bank|rente|cashback|utbytte/i.test(row.desc))
      baseTransactions.push(Object.assign({},row,{cat:'Refund',isIncome:true,amount:row.inn}));
    else if(row.ut>0)
      baseTransactions.push(Object.assign({},row,{cat:cat,isIncome:false,amount:row.ut}));
  }
  allInternals.forEach(function(t){if(transferState[uid(t)]===undefined)transferState[uid(t)]='excluded';});
  return buildReport(allInternals,baseTransactions);
}
function buildReport(allInternals,baseTransactions){
  var extraIncome=allInternals.filter(function(t){return transferState[uid(t)]==='income';}).map(function(t){return Object.assign({},t,{cat:'INCOME_TRANSFER',isIncome:true,amount:t.inn||t.ut});});
  var allTx=baseTransactions.concat(extraIncome);
  var expenses=[],income=[];
  allTx.forEach(function(t){
    var k=uid(t),ov=txOverrides[k];
    if(t.isIncome){
      if(ov&&ov.omit)return; // excluded
      var overridden=ov&&ov.isIncome?Object.assign({},t,{cat:ov.cat||t.cat,incomeLabel:ov.incomeLabel||null}):t;
      income.push(overridden);
    } else {
      if(ov&&ov.omit)return;
      expenses.push(Object.assign({},t,{cat:ov?ov.cat:t.cat}));
    }
  });
  // Add manual expenses
  manualExpenses.forEach(function(m){expenses.push(Object.assign({},m,{isIncome:false,isManual:true}));});
  var byCategory={};
  expenses.forEach(function(t){if(!byCategory[t.cat])byCategory[t.cat]=[];byCategory[t.cat].push(t);});
  var dates=baseTransactions.concat(allInternals).map(function(r){return r.date;}).filter(Boolean).sort();
  var d1=new Date(dates[0]);
  var daysInMonth=new Date(d1.getFullYear(),d1.getMonth()+1,0).getDate();
  // Use today's date for pace, capped to end of the file's month
  var today=new Date();
  var endOfMonth=new Date(d1.getFullYear(),d1.getMonth()+1,0);
  var paceDate=today<endOfMonth?today:endOfMonth;
  var daysElapsed=Math.round((paceDate-d1)/86400000)+1;
  var varRows=Object.keys(BUDGET_VAR).map(function(cat){return{cat:cat,budget:BUDGET_VAR[cat],actual:(byCategory[cat]||[]).reduce(function(s,t){return s+t.amount;},0)};});
  var fixedRows=Object.keys(BUDGET_FIXED).map(function(cat){return{cat:cat,budget:BUDGET_FIXED[cat],actual:(byCategory['Budgeted fixed costs']||[]).reduce(function(s,t){return s+t.amount;},0)};});
  var budgetedCats={'Groceries':1,'Transport':1,'Cleaning':1,'Childcare':1,'Subscriptions':1,'Budgeted fixed costs':1};
  var nonBudgeted=Object.keys(byCategory).filter(function(c){return!budgetedCats[c]&&c.indexOf('INCOME')!==0&&c!=='Refund';}).map(function(c){return[c,byCategory[c]];}).sort(function(a,b){return b[1].reduce(function(s,t){return s+t.amount;},0)-a[1].reduce(function(s,t){return s+t.amount;},0);});
  var totalIncome=income.reduce(function(s,t){return s+t.amount;},0);
  var totalExp=expenses.reduce(function(s,t){return s+t.amount;},0);
  return{income:income,totalIncome:totalIncome,varRows:varRows,fixedRows:fixedRows,nonBudgeted:nonBudgeted,byCategory:byCategory,totalExp:totalExp,net:totalIncome-totalExp,allInternals:allInternals,baseTransactions:baseTransactions,daysElapsed:daysElapsed,daysInMonth:daysInMonth,isPartial:daysElapsed<daysInMonth-1,d1:d1};
}

function computeProjection(d){
  if(!d||!d.isPartial)return null;
  var SALARY_PER_PERSON=55697;
  var SALARY_EXPECTED=SALARY_PER_PERSON*2;
  var salaryActual=d.income.filter(function(t){
    var ov=txOverrides[uid(t)];
    var label=ov&&ov.incomeLabel?ov.incomeLabel:(t.cat==='INCOME_SALARY'?'Salary':t.cat==='INCOME_TRANSFER'?'Salary transfer':null);
    return label==='Salary'||label==='Salary transfer';
  }).reduce(function(s,t){return s+t.amount;},0);
  var salaryReceived=salaryActual>0;
  var salaryForCalc=salaryReceived?salaryActual:SALARY_EXPECTED;
  var otherIncome=d.income.filter(function(t){
    var ov=txOverrides[uid(t)];
    var label=ov&&ov.incomeLabel?ov.incomeLabel:(t.cat==='INCOME_SALARY'?'Salary':t.cat==='INCOME_TRANSFER'?'Salary transfer':null);
    return label!=='Salary'&&label!=='Salary transfer'&&label!=='Buffer drawdown';
  }).reduce(function(s,t){return s+t.amount;},0);
  var effectiveIncome=salaryForCalc+otherIncome;
  var actualIncome=salaryActual+otherIncome;
  var rate=d.daysInMonth/d.daysElapsed;
  var projExp=Math.round(d.totalExp*rate);
  var projNet=effectiveIncome-projExp;
  var projectedBudgeted=d.varRows.reduce(function(s,r){return s+r.budget;},0)+d.fixedRows.reduce(function(s,r){return s+r.budget;},0);
  var actualBudgeted=d.varRows.reduce(function(s,r){return s+r.actual;},0)+d.fixedRows.reduce(function(s,r){return s+r.actual;},0);
  var nonBudgetedActual=d.nonBudgeted.filter(function(item){return item[0]!=='Misc';}).reduce(function(s,item){return s+item[1].reduce(function(ss,t){return ss+t.amount;},0);},0);
  var headroomRemaining=effectiveIncome-projectedBudgeted-nonBudgetedActual;
  return{SALARY_PER_PERSON:SALARY_PER_PERSON,SALARY_EXPECTED:SALARY_EXPECTED,salaryActual:salaryActual,salaryReceived:salaryReceived,salaryForCalc:salaryForCalc,otherIncome:otherIncome,effectiveIncome:effectiveIncome,actualIncome:actualIncome,projExp:projExp,projNet:projNet,projectedBudgeted:projectedBudgeted,actualBudgeted:actualBudgeted,nonBudgetedActual:nonBudgetedActual,headroomRemaining:headroomRemaining};
}

function pushUndo(label,fn){undoStack.push({label:label,fn:fn});showToast(label);}
function showToast(label){
  if(toastTimer)clearTimeout(toastTimer);
  var t=document.getElementById('toast');document.getElementById('toastMsg').textContent=label;
  t.style.display='flex';toastTimer=setTimeout(function(){t.style.display='none';},4500);
}
function doUndo(){
  if(!undoStack.length)return;
  var item=undoStack.pop();item.fn();
  if(toastTimer)clearTimeout(toastTimer);document.getElementById('toast').style.display='none';
  lastReport=buildReport(lastReport.allInternals,lastReport.baseTransactions);render(lastReport);
}

function addCategory(){

function deleteCategory(cat){
  if(DEFAULT_CATS.filter(function(c){return c!=='Misc';}).indexOf(cat)>=0){showToast('Built-in categories cannot be deleted');return;}
  var prevCats=CATEGORIES.slice(),prevRules=CUSTOM_RULES.slice();
  Object.keys(txOverrides).forEach(function(k){if(txOverrides[k]&&txOverrides[k].cat===cat)txOverrides[k]={cat:'Misc',omit:false};});
  CUSTOM_RULES=CUSTOM_RULES.filter(function(r){return r.cat!==cat;});
  CATEGORIES=CATEGORIES.filter(function(c){return c!==cat;});
  ghSave();
  pushUndo('Category "'+cat+'" deleted',function(){CATEGORIES=prevCats;CUSTOM_RULES=prevRules;ghSave();if(lastReport){lastReport=buildReport(lastReport.allInternals,lastReport.baseTransactions);render(lastReport);}else renderCatPanel();});
  if(lastReport){lastReport=buildReport(lastReport.allInternals,lastReport.baseTransactions);render(lastReport);}

function render(d){

    var nbWithoutMisc=d.nonBudgeted.filter(function(item){return item[0]!=='Misc';});
    var nbTotalWithoutMisc=nbWithoutMisc.reduce(function(s,item){return s+item[1].reduce(function(ss,t){return ss+t.amount;},0);},0);
    h+=sectionWrap('sec_nonbudget','Non-budgeted expenses <span class="hint">\u00b7 click rows to expand \u00b7 total: '+fmt(nbTotalWithoutMisc)+'</span>','<div class="table-wrap"><table><tr><th>Category</th><th class="tr">Transactions</th><th class="tr">Total</th></tr>'+nbWithoutMisc.map(function(item){var cat=item[0],ts=item[1],total=ts.reduce(function(s,t){return s+t.amount;},0);return makeClickableRow(cat+'_nb',[cat+(ts.some(function(t){return t.amount>2000;})?'<span class="pill pill-amb">notable</span>':''),'<span class="muted">'+ts.length+'</span>',fmt(total)],ts);}).join('')+'<tr><td class="bold" colspan="2">Total</td><td class="tr bold">'+fmt(nbTotalWithoutMisc)+'</td></tr></table></div>');
  }

  if(d.isPartial){
    var P=computeProjection(d);

    // Projection section: row 1 (kept) + row 2 (income / budget / unbudgeted with fill bars)
    var _projBody='<div class="metrics">'
      +'<div class="metric"><div class="metric-label">Projected expenses</div><div class="metric-value">'+fmt(P.projExp)+'</div></div>'
      +'<div class="metric"><div class="metric-label">'+(P.salaryReceived?'Actual income':'Expected income')+'</div><div class="metric-value pos">'+fmt(P.effectiveIncome)+(P.salaryReceived?'':' <span style="font-size:11px;font-weight:400;color:var(--amber)">est.</span>')+'</div></div>'
      +'<div class="metric"><div class="metric-label">Projected net</div><div class="metric-value '+(P.projNet>=0?'pos':'neg')+'">'+(P.projNet>=0?'+':'')+fmt(P.projNet)+'</div></div>'
      +'</div>';
    var incomeFillPct=P.effectiveIncome>0?Math.min(P.actualIncome/P.effectiveIncome,1):0;
    var budgetFillPct=P.projectedBudgeted>0?Math.min(P.actualBudgeted/P.projectedBudgeted,1):0;
    var budgetOver=P.actualBudgeted>P.projectedBudgeted;
    var headroomNewColor=P.headroomRemaining>=0?'pos':'neg';
    _projBody+='<div class="metrics">'
      +'<div class="metric">'
        +'<div class="metric-fill" style="width:'+(incomeFillPct*100).toFixed(1)+'%;background:var(--green-bg);"></div>'
        +'<div class="metric-label">Projected income</div>'
        +'<div class="metric-value pos">'+fmt(P.effectiveIncome)+'</div>'
        +'<div class="metric-sub"><span>Actual: '+fmt(P.actualIncome)+'</span><span class="metric-sub-pct">'+(incomeFillPct*100).toFixed(0)+'%</span></div>'
      +'</div>'
      +'<div class="metric">'
        +'<div class="metric-fill" style="width:'+(budgetFillPct*100).toFixed(1)+'%;background:'+(budgetOver?'var(--red-bg)':'var(--amber-bg)')+';"></div>'
        +'<div class="metric-label">Projected budgeted costs</div>'
        +'<div class="metric-value">'+fmt(P.projectedBudgeted)+'</div>'
        +'<div class="metric-sub"><span>Actual: '+fmt(P.actualBudgeted)+'</span><span class="metric-sub-pct">'+(budgetFillPct*100).toFixed(0)+'%</span></div>'
      +'</div>'
      +'<div class="metric">'
        +'<div class="metric-label">Unbudgeted costs</div>'
        +'<div class="metric-value">'+fmt(P.nonBudgetedActual)+'</div>'
        +'<div class="metric-sub"><span>Headroom remaining</span><span class="'+headroomNewColor+'" style="font-weight:500;">'+(P.headroomRemaining>=0?'+':'')+fmt(P.headroomRemaining)+'</span></div>'
      +'</div>'
      +'</div>';
    h+=sectionWrap('sec_projection','Projection \u2014 '+d.daysElapsed+' of '+d.daysInMonth+' days elapsed',_projBody);

    // Fixed items detection (drives both headroom calc and paid/pending list)
    var allExpenseTxs=Object.keys(d.byCategory).reduce(function(arr,cat){return arr.concat(d.byCategory[cat]||[]);},[]);
    var fixedItems=[
      {key:'mortgage', label:'Mortgage',amount:28000,     patterns:[/bolij/i,/mortgage/i,/l.n\s+510288/i]},
      {key:'sameiet',  label:'Sameiet OG59A',amount:4004, patterns:[/sameiet og59a/i]},
      {key:'laan',     label:'L\u00e5nekassen',amount:3418,patterns:[/l.nekassen/i,/lanekassen/i,/l\u00e5nekassen/i,/statens l/i]},
      {key:'homely',   label:'Homely',amount:339,          patterns:[/homely/i]},
      {key:'unicef',   label:'Unicef',amount:500,          patterns:[/unicef/i]},
      {key:'tjome',    label:'Tj\u00f8me',amount:1000,    patterns:[/tj.?me/i,/tj\u00f8me/i]},
      {key:'proptax',  label:'Property tax',amount:500,    patterns:[/skatteetaten/i,/eiendomsskatt/i]},
      {key:'childcare',label:'Childcare (nursery)',amount:2640,patterns:[/utdanningsetaten/i,/barnehage/i]},
    ].map(function(item){
      var autoSeen=allExpenseTxs.some(function(t){return item.patterns.some(function(p){return p.test(t.desc);});});
      var manualState=window._fixedPaid&&window._fixedPaid[item.key];
      var seen=manualState==='paid'||(manualState!=='pending'&&autoSeen);
      return Object.assign({},item,{seen:seen,autoSeen:autoSeen,manualState:manualState||null});
    });
    var pendingFixedTotal=fixedItems.filter(function(x){return!x.seen;}).reduce(function(s,x){return s+x.amount;},0);
    var varBudgetRemaining=d.varRows.reduce(function(s,r){return s+Math.max(0,r.budget-r.actual);},0);
    var headroom=P.effectiveIncome-d.totalExp-pendingFixedTotal-varBudgetRemaining;
    var headroomColor=headroom>=0?'pos':'neg';

    // Section A: Month-end headroom (3 summary boxes only)
    var _headroomBoxes='<div class="metrics">'
      +'<div class="metric"><div class="metric-label">'+(P.salaryReceived?'Income received':'Expected income')+'</div><div class="metric-value pos">'+fmt(P.effectiveIncome)+(P.salaryReceived?'':' <span style="font-size:11px;font-weight:400;color:var(--amber)">est.</span>')+'</div></div>'
      +'<div class="metric"><div class="metric-label">Spent so far</div><div class="metric-value">'+fmt(d.totalExp)+'</div></div>'
      +'<div class="metric"><div class="metric-label">Headroom left</div><div class="metric-value '+headroomColor+'">'+fmt(headroom)+'</div></div>'
      +'</div>';
    if(!P.salaryReceived){
      _headroomBoxes+='<div style="font-size:12px;color:var(--amber);padding:8px 12px;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--r);">Salary not yet received \u2014 using 55\u202F697\u202Fkr \u00d7 2 as expected income. Once salary transfers appear, mark them as \u201cSalary in\u201d in the transfers panel.</div>';
    }
    h+=sectionWrap('sec_headroom','Month-end headroom',_headroomBoxes);

    // Section B: Fixed items - paid / pending (independently collapsible)
    var _paidPendingBody='<div class="table-wrap"><table>';
    _paidPendingBody+='<tr><th>Item</th><th class="tr">Amount</th><th>Status</th><th></th></tr>';
    fixedItems.forEach(function(x){
      var statusText=x.seen
        ?(x.manualState==='paid'?'marked paid manually':(x.autoSeen?'found in transactions':'marked paid manually'))
        :(x.autoSeen?'found but overridden':'not yet seen');
      var statusColor=x.seen?'color:var(--green)':'color:var(--amber)';
      var toggleBtn=x.seen
        ?'<button data-fp-key="'+x.key+'" data-fp-val="pending" style="font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--text2)">Mark pending</button>'
        :'<button data-fp-key="'+x.key+'" data-fp-val="paid" style="font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--green-bd);background:var(--green-bg);cursor:pointer;color:var(--green)">Mark paid</button>';
      _paidPendingBody+='<tr><td>'+x.label+(x.seen?'':' <span class="pill pill-amb">pending</span>')+'</td>'
        +'<td class="tr '+(x.seen?'muted':'neg')+'">'+(x.seen?'\u2014':'\u2212'+fmt(x.amount))+'</td>'
        +'<td style="font-size:12px;'+statusColor+'">'+statusText+'</td>'
        +'<td style="text-align:right;white-space:nowrap">'+toggleBtn+'</td></tr>';
    });
    if(pendingFixedTotal>0){
      _paidPendingBody+='<tr style="border-top:2px solid var(--border2)"><td class="bold">Pending fixed payments</td><td class="tr bold neg">\u2212'+fmt(pendingFixedTotal)+'</td><td class="muted">remaining to pay</td><td></td></tr>';
    }
    _paidPendingBody+='</table></div>';
    h+=sectionWrap('sec_paid_pending','Fixed items \u2014 paid / pending',_paidPendingBody);
  }

  // Misc — with total
  var miscTxs=d.byCategory['Misc']||[];
  var miscTotal=miscTxs.reduce(function(s,t){return s+t.amount;},0);
  var _miscBody=miscTxs.length===0
    ?'<div class="misc-all-done">All transactions classified</div>'
    :'<div id="miscInteractive" class="no-print"><div class="table-wrap"><table><tr><th>Date</th><th>Description</th><th class="tr">Amount</th><th class="tr">Action</th></tr>'+miscTxs.map(function(t,i){return'<tr><td style="font-family:monospace;font-size:11px;color:var(--text3)">'+t.date+'</td><td>'+t.desc+'</td><td class="tr">'+fmt(t.amount)+'</td><td class="tr" style="white-space:nowrap"><select id="msel_'+i+'" style="font-family:sans-serif;font-size:11px;padding:3px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);color:var(--text)">'+CATEGORIES.filter(function(c){return c!=='Misc';}).map(function(c){return'<option>'+c+'</option>';}).join('')+'</select><button class="reclass-btn" onclick="classifyMisc('+i+',false)">Once</button><button class="reclass-btn" onclick="classifyMisc('+i+',true)">+Rule</button><button class="reclass-btn omit" onclick="omitMisc('+i+')">Other month</button></td></tr>';}).join('')+'<tr><td colspan="2" class="bold">Total</td><td class="tr bold">'+fmt(miscTotal)+'</td><td></td></tr></table></div></div>'
    +'<div id="miscPrintTable"><div class="table-wrap"><table><tr><th>Date</th><th>Description</th><th class="tr">Amount</th></tr>'+miscTxs.map(function(t){return'<tr><td style="font-family:monospace;font-size:11px;color:var(--text3)">'+t.date+'</td><td>'+t.desc+'</td><td class="tr">'+fmt(t.amount)+'</td></tr>';}).join('')+'<tr><td colspan="2" class="bold">Total</td><td class="tr bold">'+fmt(miscTotal)+'</td></tr></table></div></div>';
  h+=sectionWrap('sec_misc','Unclassified (Misc) <span class="hint">\u00b7 '+miscTxs.length+' remaining'+(miscTxs.length>0?' \u00b7 '+fmt(miscTotal):'')+'</span>',_miscBody);

  // Manual expenses — shown in print too
  if(manualExpenses.length>0){
    var _manBody='<div class="table-wrap"><table><tr><th>Date</th><th>Description</th><th>Category</th><th class="tr">Amount</th></tr>';
    manualExpenses.forEach(function(e){
      _manBody+='<tr><td style="font-family:monospace;font-size:11px;color:var(--text3)">'+e.date+'</td><td>'+e.desc+'</td><td class="muted">'+e.cat+'</td><td class="tr">'+fmt(e.amount)+'</td></tr>';
    });
    _manBody+='<tr><td colspan="3" class="bold">Total</td><td class="tr bold">'+fmt(manualExpenses.reduce(function(s,e){return s+e.amount;},0))+'</td></tr>';
    _manBody+='</table></div>';
    h+=sectionWrap('sec_manual','Manually added expenses',_manBody);
  }

  // Removed transactions section
  var removedTxs=[];
  if(lastReport&&lastReport.baseTransactions){
    // Check all base transactions (expenses + income) for omitted ones
    lastReport.baseTransactions.forEach(function(t){
      var k=uid(t),ov=txOverrides[k];
      if(ov&&ov.omit) removedTxs.push(t);
    });
    // Also check allInternals marked as 'other' month
    (lastReport.allInternals||[]).forEach(function(t){
      var k=uid(t);
      if(transferState[k]==='other') removedTxs.push(Object.assign({},t,{_isTransfer:true}));
    });
  }
  if(removedTxs.length>0){
    var removedBody='<div class="table-wrap"><table><tr><th>Date</th><th>Description</th><th class="tr">Amount</th><th></th></tr>';
    removedTxs.sort(function(a,b){return b.amount-a.amount;}).forEach(function(t){
      var k=uid(t);
      removedBody+='<tr><td class="muted" style="font-family:monospace;font-size:11px">'+t.date+'</td>'
        +'<td>'+t.desc+'</td>'
        +'<td class="tr">'+fmt(t.amount)+'</td>'
        +'<td style="text-align:right"><button class="restore-btn" data-restore-uid="'+k+'" data-restore-transfer="'+(t._isTransfer?'1':'0')+'">Restore</button></td>'
        +'</tr>';
    });
    removedBody+='</table></div>';
    h+=sectionWrap('sec_removed','Removed transactions <span class="hint">\u00b7 '+removedTxs.length+' removed \u00b7 click to restore</span>',removedBody);
  }

  // Transfers — collapsible
  var internals=d.allInternals;
  var incCount=internals.filter(function(t){return transferState[uid(t)]==='income';}).length;
  var skipCount=internals.filter(function(t){return transferState[uid(t)]==='other';}).length;
  var transfersCollapsed=window._transfersCollapsed===true;
  h+='<div class="section no-print" id="transferSection">';
  h+='<div class="section-title" style="cursor:pointer" onclick="toggleTransfers()">Internal transfers <span class="hint">\u00b7 '+internals.length+' total \u00b7 '+incCount+' salary \u00b7 click to '+(transfersCollapsed?'expand':'collapse')+'</span></div>';
  h+='<div id="transferBody" style="display:'+(transfersCollapsed?'none':'block')+'">';
  h+='<div class="transfer-summary"><span>'+internals.length+' total</span><span class="pos">'+incCount+' salary</span><span class="muted">'+(internals.length-incCount-skipCount)+' excluded</span>'+(skipCount>0?'<span style="color:var(--red)">'+skipCount+' other month</span>':'')+'</div><div class="transfers-list">'+internals.map(function(t,i){
    var tuid=uid(t);
    var state=transferState[tuid]||'excluded';
    var amount=t.ut>0?t.ut:t.inn;
    var dir=t.ut>0?'outgoing':'incoming';
    var sl=state==='income'?'<span class="ts ts-in">salary</span>'
      :state==='other'?'<span class="ts ts-ot">other month</span>'
      :state==='buffer'?'<span class="ts ts-buf">buffer</span>'
      :'<span class="ts ts-ex">excluded</span>';
    return '<div class="transfer-card">'
      +'<div class="transfer-info">'
        +'<div class="transfer-desc">'+t.desc+'</div>'
        +'<div class="transfer-meta">'+t.date+' · '+dir+'</div>'
      +'</div>'
      +'<div class="transfer-amount">'+fmt(amount)+'</div>'
      +sl
      +'<div class="transfer-actions">'
        +'<button class="tbtn '+(state==='income'?'active-salary':'')+'" data-ts-uid="'+tuid+'" data-ts-val="income">Salary in</button>'
        +'<button class="tbtn '+(state==='buffer'?'active-buffer':'')+'" data-ts-uid="'+tuid+'" data-ts-val="buffer">Buffer</button>'
        +'<button class="tbtn '+(state==='excluded'?'active-excluded':'')+'" data-ts-uid="'+tuid+'" data-ts-val="excluded">Exclude</button>'
        +'<button class="tbtn '+(state==='other'?'active-other':'')+'" data-ts-uid="'+tuid+'" data-ts-val="other">Other month</button>'
      +'</div>'
    +'</div>';
  }).join('')+'</div>';
  h+='</div></div>';

  h+=sectionWrap('sec_rules','Custom rules <span class="hint">\u00b7 synced to GitHub \u00b7 shared with all users</span>','<div class="rules-panel no-print">'+(CUSTOM_RULES.length===0?'<div class="no-rules">No custom rules yet.</div>':CUSTOM_RULES.map(function(r,i){return'<div class="rule-row"><span class="rule-kw">"'+r.v+'"</span><span class="rule-cat">\u2192 '+r.cat+'</span><button class="rule-del" data-rule-idx="'+i+'">Delete</button></div>';}).join(''))+'</div>');

  h+='<div class="section no-print" id="categoriesSection"></div>';

  // Manual expense entry
  var manCatOpts=CATEGORIES.filter(function(c){return c!=='Misc';}).map(function(c){return'<option>'+c+'</option>';}).join('');
  h+='<div class="section no-print"><div class="section-title">Add expense manually <span class="hint">\u00b7 for cash or missing transactions</span></div>';
  if(manualExpenses.length>0){
    h+='<div class="table-wrap" style="margin-bottom:12px"><table><tr><th>Date</th><th>Description</th><th>Category</th><th class="tr">Amount</th><th></th></tr>';
    manualExpenses.forEach(function(e){
      _manBody+='<tr><td style="font-family:monospace;font-size:11px;color:var(--text3)">'+e.date+'</td><td>'+e.desc+'</td><td class="muted">'+e.cat+'</td><td class="tr bold">'+fmt(e.amount)+'</td><td style="text-align:right"><button class="reclass-btn omit" onclick="removeManualExpense(\''+e.uid+'\')">Remove</button></td></tr>';
    });
    h+='<tr><td colspan="3" class="bold">Total</td><td class="tr bold">'+fmt(manualExpenses.reduce(function(s,e){return s+e.amount;},0))+'</td><td></td></tr>';
    h+='</table></div>';
  }
  h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;">';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">';
  h+='<div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:500;display:block;margin-bottom:5px">Description</label><input id="manDesc" type="text" placeholder="e.g. Cash groceries" style="width:100%;font-family:sans-serif;font-size:13px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);color:var(--text);" onkeydown="if(event.key===\'Enter\')addManualExpense()"></div>';
  h+='<div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:500;display:block;margin-bottom:5px">Amount (kr)</label><input id="manAmt" type="number" placeholder="0" step="0.01" style="width:100%;font-family:monospace;font-size:13px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);color:var(--text);" onkeydown="if(event.key===\'Enter\')addManualExpense()"></div>';
  h+='</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;">';
  h+='<div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:500;display:block;margin-bottom:5px">Category</label><select id="manCat" style="width:100%;font-family:sans-serif;font-size:13px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);color:var(--text);">'+manCatOpts+'</select></div>';
  h+='<div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:500;display:block;margin-bottom:5px">Date (optional)</label><input id="manDate" type="date" style="width:100%;font-family:monospace;font-size:13px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);color:var(--text);"></div>';
  h+='<button class="btn btn-primary" onclick="addManualExpense()" style="padding:8px 20px;height:38px">Add</button>';
  h+='</div></div></div>';

  document.getElementById('report').innerHTML=h;
  restoreOpenDrills();
  renderCatPanel();
  document.querySelectorAll('[data-section-id]').forEach(function(el){
    el.addEventListener('click',function(){toggleSection(el.getAttribute('data-section-id'));});
  });
  document.querySelectorAll('[data-fp-key]').forEach(function(el){
    el.addEventListener('click',function(){
      setFixedPaid(el.getAttribute('data-fp-key'),el.getAttribute('data-fp-val'));
    });
  });
  document.querySelectorAll('[data-ts-uid]').forEach(function(el){
    el.addEventListener('click',function(){
      setTransfer(el.getAttribute('data-ts-uid'),el.getAttribute('data-ts-val'));
    });
  });
  document.querySelectorAll('[data-restore-uid]').forEach(function(el){
    el.addEventListener('click',function(){
      var k=el.getAttribute('data-restore-uid');
      var isTransfer=el.getAttribute('data-restore-transfer')==='1';
      if(isTransfer){
        // Internal transfer marked 'other month' — reset to excluded
        var prev=transferState[k];
        transferState[k]='excluded';
        pushUndo('Restored transfer',function(){transferState[k]=prev;});
      } else {
        // Regular tx or income — delete the omit override
        var prev=txOverrides[k]?Object.assign({},txOverrides[k]):null;
        delete txOverrides[k];
        pushUndo('Restored transaction',function(){if(prev)txOverrides[k]=prev;else delete txOverrides[k];});
      }
      saveToLocalStorage();
      lastReport=buildReport(lastReport.allInternals,lastReport.baseTransactions);
      render(lastReport);
    });
  });
  document.querySelectorAll('[data-rule-idx]').forEach(function(el){
    el.addEventListener('click',function(){
      deleteCustomRule(parseInt(el.getAttribute('data-rule-idx')));
    });
  });
  // auto-save to Supabase on each render (debounced)
  if(lastReport){
    // Save to localStorage + Supabase on every render
    saveToLocalStorage();
  }
}

function toggleTransfers(){
  window._transfersCollapsed=!window._transfersCollapsed;
  var body=document.getElementById('transferBody');
  var section=document.getElementById('transferSection');
  if(body){body.style.display=window._transfersCollapsed?'none':'block';}
  if(section){var title=section.querySelector('.section-title');if(title){var hint=title.querySelector('.hint');if(hint){var incCount=lastReport.allInternals.filter(function(_,i){return transferState[String(i)]==='income';}).length;hint.textContent='\u00b7 '+lastReport.allInternals.length+' total \u00b7 '+incCount+' salary \u00b7 click to '+(window._transfersCollapsed?'expand':'collapse');}}}
}
</script>
</body>
</html>
